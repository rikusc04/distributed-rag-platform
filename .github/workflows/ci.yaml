name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ingestion-worker:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/ingestion-worker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - run: mypy src
      - run: pytest -q

  mcp-gateway:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/mcp-gateway
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test

  terraform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8
      - run: terraform -chdir=infra/environments/dev fmt -check -recursive
      - run: terraform -chdir=infra/environments/dev init -backend=false
      - run: terraform -chdir=infra/environments/dev validate
