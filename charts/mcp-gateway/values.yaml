image:
  repository: ""  # ECR URL, wired by CI
  tag: latest
  pullPolicy: IfNotPresent

replicaCount: 2

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 20
  targetCPUUtilizationPercentage: 70

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: true
  className: alb
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
  hosts: []

resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 512Mi

serviceAccount:
  create: true
  annotations: {}

env:
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://tempo:4318"
