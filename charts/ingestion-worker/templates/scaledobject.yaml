{{- if .Values.keda.enabled -}}
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: {{ include "ingestion-worker.fullname" . }}
  labels:
    {{- include "ingestion-worker.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    name: {{ include "ingestion-worker.fullname" . }}
  minReplicaCount: {{ .Values.keda.minReplicas }}
  maxReplicaCount: {{ .Values.keda.maxReplicas }}
  pollingInterval: {{ .Values.keda.pollingIntervalSeconds }}
  cooldownPeriod: {{ .Values.keda.cooldownSeconds }}
  triggers:
    - type: aws-sqs-queue
      metadata:
        queueURL: {{ required "config.queueUrl is required" .Values.config.queueUrl | quote }}
        queueLength: {{ .Values.keda.messagesPerReplica | quote }}
        awsRegion: {{ .Values.aws.region | quote }}
        # Count both in-flight and visible messages so a spike of long-running
        # embeds doesn't scale us back to zero mid-batch.
        scaleOnInFlight: "true"
      authenticationRef:
        name: {{ include "ingestion-worker.fullname" . }}-aws
{{- end }}
