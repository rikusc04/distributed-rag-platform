# -- Container image. Repository is required; tag defaults to `latest`.
image:
  repository: ""  # e.g. 123456789012.dkr.ecr.us-east-1.amazonaws.com/ingestion-worker
  tag: latest
  pullPolicy: IfNotPresent

# KEDA controls the actual replica count — we start at 0 and scale on queue depth.
replicaCount: 0

aws:
  region: us-east-1

# Non-secret runtime config. All of these are required (deployment.yaml enforces).
config:
  queueUrl: ""
  bucketName: ""
  dbHost: ""
  dbPort: 5432
  dbName: ""
  dbSecretArn: ""     # ARN of the Secrets Manager entry holding {username, password}
  embedModel: "text-embedding-3-small"
  embedDim: 1536

# Secret must be pre-created in the same namespace and contain: OPENAI_API_KEY
openaiSecret:
  name: openai-api-key

# Free-form extra env vars, merged into the container's env list.
env: {}

keda:
  enabled: true
  minReplicas: 0
  maxReplicas: 50
  messagesPerReplica: 5
  pollingIntervalSeconds: 15
  cooldownSeconds: 60

resources:
  requests:
    cpu: 200m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 1Gi

serviceAccount:
  create: true
  name: ""
  # eks.amazonaws.com/role-arn: <ingestion-worker IRSA role from terraform output>
  annotations: {}
